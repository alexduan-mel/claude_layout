<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Claude Formatter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h2 {
      font-size: 15px;
      margin-bottom: 14px;
      color: #c8a8f9;
      letter-spacing: 0.03em;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    label { flex: 1; color: #bbb; }
    .controls { display: flex; align-items: center; gap: 6px; }
    input[type="range"] {
      width: 110px;
      accent-color: #c8a8f9;
    }
    .val {
      width: 36px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: #e0e0e0;
    }
    hr { border: none; border-top: 1px solid #333; margin: 12px 0; }
    button#reset {
      width: 100%;
      padding: 7px;
      border: none;
      border-radius: 6px;
      background: #3a2f5a;
      color: #c8a8f9;
      cursor: pointer;
      font-size: 13px;
    }
    button#reset:hover { background: #4a3f6a; }
    select {
      background: #2a2a40;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 5px;
      padding: 3px 6px;
      font-size: 12px;
      cursor: pointer;
      max-width: 148px;
    }
    select:focus { outline: 1px solid #c8a8f9; }
  </style>
</head>
<body>
  <h2>Claude Formatter</h2>

  <div class="row">
    <label>Font</label>
    <select id="fontFamily">
      <option value="">Site default</option>
      <optgroup label="System">
        <option value="Georgia">Georgia</option>
        <option value="Palatino">Palatino</option>
        <option value="Verdana">Verdana</option>
      </optgroup>
      <optgroup label="Google Fonts">
        <option value="Lora">Lora</option>
        <option value="Merriweather">Merriweather</option>
        <option value="Inter">Inter</option>
        <option value="Literata">Literata</option>
      </optgroup>
    </select>
  </div>

  <div class="row">
    <label>Content width</label>
    <div class="controls">
      <input type="range" id="contentWidth" min="600" max="1400" step="20" />
      <span class="val" id="contentWidthVal"></span>
    </div>
  </div>

  <div class="row">
    <label>Font size</label>
    <div class="controls">
      <input type="range" id="fontSize" min="12" max="24" step="1" />
      <span class="val" id="fontSizeVal"></span>
    </div>
  </div>

  <div class="row">
    <label>Line height</label>
    <div class="controls">
      <input type="range" id="lineHeight" min="1.2" max="2.4" step="0.05" />
      <span class="val" id="lineHeightVal"></span>
    </div>
  </div>

  <div class="row">
    <label>Letter spacing</label>
    <div class="controls">
      <input type="range" id="letterSpacing" min="0" max="0.08" step="0.005" />
      <span class="val" id="letterSpacingVal"></span>
    </div>
  </div>

  <div class="row">
    <label>Code font size</label>
    <div class="controls">
      <input type="range" id="codeFontSize" min="10" max="20" step="1" />
      <span class="val" id="codeFontSizeVal"></span>
    </div>
  </div>

  <hr />
  <button id="reset">Reset to defaults</button>

  <script src="popup.js"></script>
</body>
</html>
